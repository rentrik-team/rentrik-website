# ─────────────────────────────────────────────────────────────
# Rentrik Web — CI/CD Pipeline (EC2)
#
# Triggers:
#   push to main    → build image, push to ECR, deploy to EC2
#   push to staging → build image, push to ECR (no deploy)
#   push to dev     → build image, push to ECR (no deploy)
#   PRs             → quality checks only (no build/deploy)
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_ACCOUNT_ID
#   ECR_REPOSITORY
#   EC2_HOST, EC2_SSH_KEY, EC2_USER (ec2-user for Amazon Linux 2023)
#   EC2_APP_PATH (optional, default /home/ec2-user/rentrik-website)
#   RESEND_API_KEY
#   (+ optional: NEXT_PUBLIC_API_URL, NEXT_PUBLIC_GA_MEASUREMENT_ID, etc.)
# ─────────────────────────────────────────────────────────────

name: CI / CD

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

env:
  AWS_REGION: ap-south-1
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1 — Quality checks (runs on every push and PR)
  # ──────────────────────────────────────────────────────────
  quality:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Tests
        run: npm run test

  # ──────────────────────────────────────────────────────────
  # JOB 2 — Build & push Docker image to ECR
  # ──────────────────────────────────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "app_url=https://rentrik.in" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "app_url=https://staging.rentrik.in" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "app_url=https://dev.rentrik.in" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_TAG="${{ steps.env.outputs.environment }}-${SHORT_SHA}"
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ steps.env.outputs.app_url }}
            NEXT_PUBLIC_ENVIRONMENT=${{ steps.env.outputs.environment }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
            NEXT_PUBLIC_MIXPANEL_TOKEN=${{ secrets.NEXT_PUBLIC_MIXPANEL_TOKEN }}
            NEXT_PUBLIC_SHOW_WAITLIST_FORM=true
            NEXT_PUBLIC_APP_STORE_URL=${{ secrets.NEXT_PUBLIC_APP_STORE_URL }}
            NEXT_PUBLIC_PLAY_STORE_URL=${{ secrets.NEXT_PUBLIC_PLAY_STORE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # JOB 3 — Deploy to EC2 (main branch only)
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy → EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            APP_PATH="${{ secrets.EC2_APP_PATH }}"
            if [ -z "$APP_PATH" ]; then
              APP_PATH="/home/ec2-user/rentrik-website"
            fi

            cd $APP_PATH

            echo "Logging into AWS ECR..."

            aws ecr get-login-password --region ap-south-1 | \
            docker login --username AWS --password-stdin \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

            echo "Pulling latest container..."

            export ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com"
            export ECR_REPOSITORY="${{ secrets.ECR_REPOSITORY }}"
            export IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
            export RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"

            docker compose -f docker/docker-compose.prod.yml pull
            docker compose -f docker/docker-compose.prod.yml up -d

            echo "✅ Deployment complete."
      - name: Notify on success
        if: success()
        run: echo "✅ Deploy successful — ${{ needs.build.outputs.image-tag }}"
