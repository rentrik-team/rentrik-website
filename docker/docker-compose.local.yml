# ─────────────────────────────────────────────────────────────
# Local development with Docker
# Usage: docker compose -f docker/docker-compose.local.yml up
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: builder # Use builder stage so hot reload works
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ..:/app # Mount source for hot reload
      - /app/node_modules # Don't override container's node_modules
      - /app/.next # Don't override build output
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_ENVIRONMENT=local
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    env_file:
      - ../.env.local
    restart: unless-stopped
