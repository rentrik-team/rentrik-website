# ─────────────────────────────────────────────────────────────
# Staging environment
# Usage: docker compose -f docker/docker-compose.staging.yml up -d
# Mirrors production but uses staging env vars
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_ENVIRONMENT: staging
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID}
        NEXT_PUBLIC_MIXPANEL_TOKEN: ${NEXT_PUBLIC_MIXPANEL_TOKEN}
        NEXT_PUBLIC_SHOW_WAITLIST_FORM: ${NEXT_PUBLIC_SHOW_WAITLIST_FORM}
        NEXT_PUBLIC_APP_STORE_URL: ${NEXT_PUBLIC_APP_STORE_URL}
        NEXT_PUBLIC_PLAY_STORE_URL: ${NEXT_PUBLIC_PLAY_STORE_URL}
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - RESEND_API_KEY=${RESEND_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rentrik-network

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.staging.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro # SSL certs (Let's Encrypt or ACM)
      - nginx-cache:/var/cache/nginx
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rentrik-network

volumes:
  nginx-cache:

networks:
  rentrik-network:
    driver: bridge
