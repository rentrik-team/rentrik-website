# ─────────────────────────────────────────────────────────────
# Nginx — Production
# Domain: rentrik.in
#
# In AWS ECS, SSL termination is handled by ALB (Application
# Load Balancer) with ACM certificates, so Nginx here only
# needs to handle HTTP on port 80 internally (ALB → Nginx).
# ─────────────────────────────────────────────────────────────

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ───────────────────────────────────────────────
  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"bytes":$body_bytes_sent,'
      '"duration":$request_time,'
      '"user_agent":"$http_user_agent"'
    '}';
  access_log /var/log/nginx/access.log json_combined;

  # ── Performance ───────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  keepalive_requests 1000;

  # Gzip
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_buffers      16 8k;
  gzip_http_version 1.1;
  gzip_min_length   256;
  gzip_types
    application/atom+xml application/javascript application/json
    application/ld+json application/manifest+json application/rss+xml
    application/vnd.geo+json application/vnd.ms-fontobject
    application/x-font-ttf application/x-web-app-manifest+json
    application/xhtml+xml application/xml font/opentype
    image/bmp image/svg+xml image/x-icon text/cache-manifest
    text/css text/plain text/vcard text/vnd.rim.location.xloc
    text/vtt text/x-component text/x-cross-domain-policy;

  # ── Security ──────────────────────────────────────────────
  server_tokens off;

  # ── Rate limiting ─────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=general:20m rate=60r/s;
  limit_req_zone $binary_remote_addr zone=api:10m     rate=20r/s;

  # ── Upstream ──────────────────────────────────────────────
  upstream nextjs {
    server web:3000;
    keepalive 64;
  }

  # ── Internal HTTP server (ALB terminates SSL externally) ──
  server {
    listen 80;
    server_name rentrik.in www.rentrik.in;

    # Trust ALB forwarded headers
    real_ip_header    X-Forwarded-For;
    set_real_ip_from  10.0.0.0/8;   # VPC CIDR — adjust if needed

    # Health check endpoint for ALB target group
    location /api/health {
      proxy_pass http://nextjs;
      access_log off;
    }

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"              always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header X-XSS-Protection          "1; mode=block"           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(self)" always;

    # ── Next.js static — immutable cache ──────────────────
    location /_next/static/ {
      proxy_pass http://nextjs;
      add_header Cache-Control "public, max-age=31536000, immutable";
      proxy_hide_header X-Powered-By;
    }

    # ── Public folder assets ──────────────────────────────
    location /static/ {
      proxy_pass http://nextjs;
      add_header Cache-Control "public, max-age=86400";
    }

    location /fonts/ {
      proxy_pass http://nextjs;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── API routes ────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=40 nodelay;
      proxy_pass         http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_read_timeout 30s;
    }

    # ── All other routes ──────────────────────────────────
    location / {
      limit_req zone=general burst=100 nodelay;
      proxy_pass         http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
      proxy_hide_header  X-Powered-By;
    }
  }
}
