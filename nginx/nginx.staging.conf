# ─────────────────────────────────────────────────────────────
# Nginx — Staging (EC2, no ALB)
# Domain: staging.rentrik.in
# Requires: SSL certs in nginx/ssl/, .htpasswd for basic auth
# ─────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ──────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  # ── Performance ───────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  gzip               on;
  gzip_vary          on;
  gzip_proxied       any;
  gzip_comp_level    6;
  gzip_types         text/plain text/css text/xml application/json
                     application/javascript application/rss+xml
                     application/atom+xml image/svg+xml;

  # ── Rate limiting ─────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=api:10m     rate=10r/s;

  # ── Upstream — Next.js ────────────────────────────────────
  upstream nextjs {
    server web:3000;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────
  server {
    listen 80;
    server_name staging.rentrik.in _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS server ──────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name staging.rentrik.in _;

    ssl_certificate     /etc/nginx/ssl/staging.rentrik.in.crt;
    ssl_certificate_key /etc/nginx/ssl/staging.rentrik.in.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Basic auth on staging — keep it private
    auth_basic           "Rentrik Staging";
    auth_basic_user_file /etc/nginx/ssl/.htpasswd;

    # Health check endpoint (no auth for ALB/container healthchecks)
    location /api/health {
      auth_basic off;
      proxy_pass http://nextjs;
      access_log off;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Static assets — long cache ────────────────────────
    location /_next/static/ {
      proxy_pass http://nextjs;
      add_header Cache-Control "public, max-age=31536000, immutable";
      proxy_cache_valid 200 1y;
    }

    location /static/ {
      proxy_pass http://nextjs;
      add_header Cache-Control "public, max-age=86400";
    }

    # ── API routes — rate limited ─────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # ── All other routes ──────────────────────────────────
    location / {
      limit_req zone=general burst=50 nodelay;
      proxy_pass         http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade         $http_upgrade;
      proxy_set_header   Connection      "upgrade";
      proxy_set_header   Host            $host;
      proxy_set_header   X-Real-IP       $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
    }
  }
}
